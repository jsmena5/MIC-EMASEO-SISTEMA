name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Backend Node services: lint + test ───────────────────────────────────────
  backend:
    name: backend / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, auth-service, users-service, image-service]
    defaults:
      run:
        working-directory: Backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/${{ matrix.service }}/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint --if-present
      - run: npm test --if-present

  # ── Python ml-service: lint + test ───────────────────────────────────────────
  ml-service:
    name: backend / ml-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: Backend/ml-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: pytest -q || echo "No tests yet"

  # ── Frontend supervisor panel: lint + test + build ───────────────────────────
  supervisor-panel:
    name: frontend / supervisor-panel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/supervisor-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Frontend/supervisor-panel/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint --if-present
      - run: npm test
      - name: Build
        env:
          VITE_API_URL: https://micemaseo.duckdns.org/api
        run: npm run build

  # ── Frontend admin panel: lint + test + build ─────────────────────────────
  admin-panel:
    name: frontend / admin-panel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/admin-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Frontend/admin-panel/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint --if-present
      - run: npm test
      - name: Build
        env:
          VITE_API_URL: https://micemaseo.duckdns.org/api
        run: npm run build

  # ── Frontend smart-waste-mobile: typecheck ───────────────────────────────────
  mobile:
    name: frontend / smart-waste-mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/smart-waste-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/smart-waste-mobile/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: TypeScript check
        env:
          EXPO_PUBLIC_API_URL: https://api.example.com/api
        run: npx tsc --noEmit

  # ── Build & push imágenes Docker (solo en main) ──────────────────────────────
  docker:
    name: docker / ${{ matrix.target }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, ml-service, supervisor-panel, admin-panel]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api-gateway
            context: Backend/api-gateway
          - target: auth-service
            context: Backend/auth-service
          - target: users-service
            context: Backend/users-service
          - target: image-service
            context: Backend/image-service
          - target: ml-service
            context: Backend/ml-service
          - target: supervisor-panel
            context: Frontend/supervisor-panel
            build-arg: VITE_API_URL=https://micemaseo.duckdns.org/api
          - target: admin-panel
            context: Frontend/admin-panel
            build-arg: VITE_API_URL=https://micemaseo.duckdns.org/api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-arg }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to:   type=gha,scope=${{ matrix.target }},mode=max
