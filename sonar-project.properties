# ============================================================================
# SonarQube — MIC-EMASEO Sistema
# Proyecto multi-módulo: Node.js + TypeScript + Python
# ============================================================================

sonar.projectKey=mic-emaseo-sistema
sonar.projectName=MIC-EMASEO Sistema
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# ── Fuentes ─────────────────────────────────────────────────────────────────
sonar.sources=\
  Backend/api-gateway/src,\
  Backend/auth-service/src,\
  Backend/users-service/src,\
  Backend/image-service/src,\
  Backend/ml-service,\
  Frontend/admin-panel/src,\
  Frontend/supervisor-panel/src,\
  Frontend/smart-waste-mobile/src

# ── Identificación de archivos de test ───────────────────────────────────────
sonar.test.inclusions=\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.test.js,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  Backend/ml-service/tests/**

# ── Exclusiones (generados, dependencias, datos) ─────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/venv*/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/coverage/**,\
  Backend/database/**,\
  scripts/**

sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/tests/**,\
  **/migrations/**,\
  **/seeds/**,\
  Frontend/**/pages/**,\
  Frontend/**/screens/**,\
  Frontend/**/components/**,\
  Frontend/**/features/incidents/**,\
  Frontend/**/features/auth/AuthGuard*,\
  Frontend/**/features/auth/AuthContext*,\
  Frontend/**/App.tsx,\
  Frontend/**/main.tsx,\
  Frontend/smart-waste-mobile/src/navigation/**,\
  Frontend/smart-waste-mobile/src/context/**

# ── Cobertura ────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=\
  Backend/auth-service/coverage/lcov.info,\
  Backend/users-service/coverage/lcov.info,\
  Backend/image-service/coverage/lcov.info,\
  Frontend/admin-panel/coverage/lcov.info,\
  Frontend/supervisor-panel/coverage/lcov.info

sonar.python.coverage.reportPaths=Backend/ml-service/coverage.xml

# ── Lenguajes ────────────────────────────────────────────────────────────────
sonar.python.version=3.11
sonar.javascript.node.maxspace=4096
