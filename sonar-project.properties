# ============================================================================
# SonarQube — MIC-EMASEO Sistema
# Proyecto multi-módulo: Node.js + TypeScript + Python
# ============================================================================

sonar.projectKey=mic-emaseo-sistema
sonar.projectName=MIC-EMASEO Sistema
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# ── Fuentes ─────────────────────────────────────────────────────────────────
sonar.sources=Backend/api-gateway/src,Backend/auth-service/src,Backend/users-service/src,Backend/image-service/src,Backend/ml-service,Frontend/admin-panel/src,Frontend/supervisor-panel/src,Frontend/smart-waste-mobile/src

# ── Tests ────────────────────────────────────────────────────────────────────
sonar.tests=Backend/api-gateway/src/__tests__,Backend/auth-service/src/__tests__,Backend/users-service/src/__tests__,Backend/image-service/src/__tests__,Backend/ml-service/tests,Frontend/admin-panel/src,Frontend/supervisor-panel/src

sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/tests/**

# ── Exclusiones ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/venv*/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/coverage/**,\
  Frontend/smart-waste-mobile/dist/**,\
  Backend/database/**

sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/tests/**,\
  **/migrations/**,\
  **/seeds/**

# ── Cobertura ────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=\
  Backend/api-gateway/coverage/lcov.info,\
  Backend/auth-service/coverage/lcov.info,\
  Backend/users-service/coverage/lcov.info,\
  Backend/image-service/coverage/lcov.info

sonar.python.coverage.reportPaths=Backend/ml-service/coverage.xml

# ── Lenguajes ────────────────────────────────────────────────────────────────
sonar.python.version=3.11
sonar.javascript.node.maxspace=4096
