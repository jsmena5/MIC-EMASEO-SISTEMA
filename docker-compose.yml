# ── Variables compartidas entre ml-api y ml-worker ───────────────────────────
# Cambiar DUMMY_MODE a "false" y descomentar ML_MODEL_PATH para inferencia real.
x-ml-env: &ml-env
  REDIS_URL: redis://redis:6379/0
  DUMMY_MODE: "true"
  UPLOADS_DIR: /app/uploads
  # ML_MODEL_PATH: /app/models/rtdetr_l_best.pt

services:

  # ── 1. Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: emaseo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: MIC-EMASEO
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/database/01_init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
      - ./Backend/database/02_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
      - ./Backend/database/008_refresh_tokens.sql:/docker-entrypoint-initdb.d/03_refresh_tokens.sql
      - ./Backend/database/009_password_reset_tokens.sql:/docker-entrypoint-initdb.d/04_password_reset_tokens.sql
      - ./Backend/database/010_incident_status_async.sql:/docker-entrypoint-initdb.d/05_incident_status_async.sql
      - ./Backend/database/011_consolidation.sql:/docker-entrypoint-initdb.d/06_consolidation.sql
      - ./Backend/database/012_db_users_isolation.sql:/docker-entrypoint-initdb.d/07_db_users_isolation.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MIC-EMASEO"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── 2. Object Storage ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: emaseo-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── 3. Init: crea bucket y lo hace público (lectura) ──────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: emaseo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/emaseo-incidents &&
        mc anonymous set download local/emaseo-incidents &&
        echo 'Bucket emaseo-incidents listo.'
      "
    restart: on-failure

  # ── 4. Redis — Broker + Result Backend para Celery ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: emaseo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 5. ML API — Gunicorn + UvicornWorkers (I/O-bound, sin GPU) ───────────────
  ml-api:
    build:
      context: ./Backend/ml-service
    container_name: emaseo-ml-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *ml-env
      # GUNICORN_WORKERS: 5   # override manual; por defecto = (2×cores)+1
    volumes:
      - shared_uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    # Gunicorn lanza (2×cores)+1 UvicornWorkers — acepta miles de conexiones HTTP.
    # En desarrollo local reemplaza este comando por:
    #   uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    command: gunicorn main:app -c gunicorn.conf.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ── 6. Celery Worker — inferencia GPU/CPU (1 proceso = 1 GPU slot) ───────────
  #
  # ESCALADO HORIZONTAL:
  #   docker compose up -d --scale ml-worker=3
  #   Cada réplica recibe un hostname único (worker@<container-id>).
  #   En hosts multi-GPU cada réplica ocupa 1 GPU. Con 1 sola GPU las 3 comparten.
  #
  # GPU (opcional): descomenta el bloque "reservations" si tienes NVIDIA Container
  # Toolkit instalado. Sin él el worker corre en CPU (más lento, pero funciona).
  # https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  ml-worker:
    build:
      context: ./Backend/ml-service
    restart: unless-stopped
    # Sin container_name → permite múltiples réplicas con --scale
    # Sin ports        → sin colisiones al hacer scale-out
    environment:
      <<: *ml-env
    volumes:
      - shared_uploads:/app/uploads
      - ./ML/modelos:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
    # --hostname worker@%h: cada réplica aparece con nombre único en Flower/Redis.
    # worker_concurrency=1 y prefetch_multiplier=1 configurados en celery_app.py
    command: >
      celery -A celery_app worker
        -Q ml_queue,dead_letter
        --loglevel=info
        --hostname=worker@%h
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        # reservations:      # ← descomentar solo si tienes GPU NVIDIA + Container Toolkit
        #   devices:
        #     - driver: nvidia
        #       count: 1
        #       capabilities: [gpu]

  # ── 7. Flower — dashboard de tareas Celery ────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: emaseo-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: celery --broker=redis://redis:6379/0 flower --port=5555

volumes:
  postgres_data:
  minio_data:
  redis_data:
  # Volumen compartido entre ml-api (escribe) y ml-worker (lee + elimina)
  # Docker gestiona el ciclo de vida; los archivos viven solo durante la inferencia.
  shared_uploads:
