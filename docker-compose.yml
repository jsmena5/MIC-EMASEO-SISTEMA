services:

  # ── 1. Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: emaseo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: MIC-EMASEO
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/database/01_init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
      - ./Backend/database/02_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MIC-EMASEO"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── 2. Object Storage ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: emaseo-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── 3. Init: crea bucket y lo hace público (lectura) ──────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: emaseo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/emaseo-incidents &&
        mc anonymous set download local/emaseo-incidents &&
        echo 'Bucket emaseo-incidents listo.'
      "
    restart: on-failure

  # ── 4. Microservicios de backend (añadir aquí cuando se dockericen) ───────────
  # image-service:
  #   build: ./Backend/image-service
  #   container_name: emaseo-image-service
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy

volumes:
  postgres_data:
  minio_data:
